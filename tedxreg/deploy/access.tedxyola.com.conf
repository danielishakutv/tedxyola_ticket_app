# Apache vhost for access.tedxyola.com -> Node app on 127.0.0.1:8787
#
# Install:
#   sudo a2enmod proxy proxy_http headers ssl
#   sudo cp deploy/access.tedxyola.com.conf /etc/apache2/sites-available/access.tedxyola.com.conf
#   # edit the SSL lines below to match your existing cert
#   sudo a2ensite access.tedxyola.com
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# This is a NEW, separate vhost — it does not touch your other sites.

<VirtualHost *:80>
    ServerName access.tedxyola.com
    Redirect permanent / https://access.tedxyola.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName access.tedxyola.com

    SSLEngine on
    # >>> Point these at your existing certificate (e.g. a wildcard *.tedxyola.com).
    # The easiest path: copy these two lines verbatim from one of your working
    # subdomain vhosts (e.g. dashboard.tedxyola.com.conf).
    SSLCertificateFile      /etc/letsencrypt/live/tedxyola.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/tedxyola.com/privkey.pem

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8787/
    ProxyPassReverse / http://127.0.0.1:8787/
    RequestHeader set X-Forwarded-Proto "https"

    ErrorLog  ${APACHE_LOG_DIR}/access.tedxyola.com-error.log
    CustomLog ${APACHE_LOG_DIR}/access.tedxyola.com-access.log combined
</VirtualHost>
